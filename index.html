<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container_tela">
        <div class="caixa_login">

            <h2 class="titulo text-center">Login</h2>

            <form action="">

                <div class="campo">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control input" placeholder="Digite seu email">
                </div>

                <div class="campo">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-control input" placeholder="Digite sua senha">
                </div>

                <div class="campo">
                    <button type="submit">Entrar</button>
                </div>

                <div class="link-area text-center">
                    <span>Não tem conta?</span>
                    <a href="#" class="link">Cadastre-se</a>
                </div>


            </form>

        </div>
    </main>

</body>

</html>
